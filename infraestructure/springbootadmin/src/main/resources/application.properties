spring.application.name=springbootadmin
server.port=${SERVER_PORT:8090}


eureka.client.service-url.defaultZone=${EUREKA_SERVICE_URL:http://eurekaserver:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.healthcheck.enabled=true
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
spring.cloud.config.enabled=${SPRING_CLOUD_CONFIG_ENABLED:false}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

management.endpoints.web.exposure.include=*
