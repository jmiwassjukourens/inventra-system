spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    config:
      server:
        git:
          default-label: main
          uri: ${REPOSITORY_PATH:https://github.com/jmiwassjukourens/inventra-config-repo/}
          username: ${GIT_USERNAME:jmiwassjukourens}
          password: ${GIT_TOKEN:}
  application:
      name: inventra-config-server

server:
  port: ${SERVER_PORT:8888}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true